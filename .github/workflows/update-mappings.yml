name: Update IAM Mappings

on:
  schedule:
    - cron: '0 9 1 * *'  # 毎月1日 09:00 UTC
  workflow_dispatch:      # 手動実行も可能

jobs:
  update:
    name: Regenerate aws.yaml from CloudFormation schemas
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write  # OIDC for AWS

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Generate mappings
        run: |
          go run ./cmd/gen-mappings \
            --out internal/plan/mappings/aws.yaml \
            --region us-east-1

      - name: Verify build still passes
        run: go build ./... && go test ./...

      - name: Update MAPPING_COVERAGE.md date
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i "s/[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}/$TODAY/g" mappings/MAPPING_COVERAGE.md

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update IAM mappings from CloudFormation schemas"
          title: "chore: update IAM mappings (${{ github.run_id }})"
          body: |
            Auto-generated from AWS CloudFormation Resource Provider Schemas.

            ## What changed
            - Regenerated `internal/plan/mappings/aws.yaml` from live CFn schemas
            - Updated `mappings/MAPPING_COVERAGE.md` dates

            ## Review checklist
            - [ ] New resource types look correct
            - [ ] Removed resource types are intentional (CFn deprecated them)
            - [ ] `go test ./...` passes (CI verified above)

            ---
            *Generated by the `update-mappings` workflow. Do not edit this PR manually.*
          branch: auto/update-iam-mappings
          delete-branch: true
          labels: automated,mappings
